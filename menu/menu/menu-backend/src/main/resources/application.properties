# === Uygulama Kimliği ===
spring.application.name=smart-bistro
# === Veritabanı Bağlantısı ===
# Veritabanı ismini 'smart_bistro_db' olarak güncelledim.
spring.datasource.url=jdbc:mysql://localhost:3306/smart_bistro_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# === JPA / Hibernate (Code First) ===
# 'update' modu sayesinde Entity'lerini yazdıkça tabloların otomatik oluşacak.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# === API Dokümantasyonu (Swagger/OpenAPI) ===
# Proje bittiğinde jüriye tüm API uç noktalarını buradan gösterebilirsin.
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# === Sunucu ve CORS Ayarları ===
server.port=8080
# React (localhost:3000) ile konuşabilmek için gerekli ayar.
spring.web.cors.allowed-origins=http://localhost:5173
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# === Dosya Yükleme (Stok resimleri veya Faturalar için) ===
app.upload.dir=uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# === Güvenlik ===
jwt.secret=VGhpcy1pcy1hLXZlcnktc2VjdXJlLWtleS1mb3Itand0LXNpZ25pbmctMjAyNDA1MTQ=
jwt.expiration=86400000

# === Döngüsel Referans İzni ===
# Bazı karmaşık JPA ilişkilerinde hata almamak için açık kalması iyidir.
spring.main.allow-circular-references=true